<div class="subjects-page p-4">
  <p-toast />
  <p-confirmDialog />

  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">Matérias</h2>
    <p-button label="Nova Matéria" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>

  @if (loading) {
    <div class="flex justify-content-center mt-6">
      <p-progressSpinner />
    </div>
  } @else if (subjects.length === 0) {
    <div class="text-center mt-6">
      <i class="pi pi-book text-4xl text-color-secondary mb-3 block"></i>
      <p class="text-color-secondary mb-3">Nenhuma matéria cadastrada ainda.</p>
      <p-button label="Criar primeira matéria" icon="pi pi-plus" (onClick)="openCreate()" />
    </div>
  } @else {
    <div class="flex flex-column gap-2">
      @for (subject of subjects; track subject.id) {
        <p-card>
          <div class="flex align-items-center justify-content-between">
            <a [routerLink]="['/subjects', subject.id]" class="font-medium text-lg no-underline text-color">
              {{ subject.name }}
            </a>
            <div class="flex gap-2">
              <p-button icon="pi pi-pencil" [text]="true" severity="secondary" (onClick)="openEdit(subject)" />
              <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="confirmDelete(subject)" />
            </div>
          </div>
        </p-card>
      }
    </div>
  }

  <p-dialog
    [(visible)]="dialogVisible"
    [header]="editingSubject ? 'Editar Matéria' : 'Nova Matéria'"
    [modal]="true"
    [style]="{ width: '90vw', maxWidth: '400px' }"
  >
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="field">
        <label for="name">Nome</label>
        <input
          id="name"
          type="text"
          pInputText
          formControlName="name"
          placeholder="Ex: Matemática"
          class="w-full mt-1"
        />
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <small class="p-error">Nome é obrigatório (máx. 100 caracteres)</small>
        }
      </div>
    </form>
    <ng-template pTemplate="footer">
      <p-button label="Cancelar" [text]="true" severity="secondary" (onClick)="dialogVisible = false" />
      <p-button label="Salvar" icon="pi pi-check" (onClick)="save()" [disabled]="form.invalid" />
    </ng-template>
  </p-dialog>
</div>
