gate: CONCERNS
story: '4.2'
title: Frontend — Calendário + Agendamento de Sessões
reviewed_by: Quinn (@qa)
reviewed_at: '2026-03-15'
quality_score: 83

decision: CONCERNS
summary: >
  Calendário FullCalendar funcional, cores por status, form de agendamento com cascade matéria→tema,
  painel de detalhe, 274 testes passando. Dois concerns: botão "Registrar resultado" ausente
  do dialog (AC8 gap) e N requests paralelos sem cleanup no openSessionDetail.

evidence:
  tests:
    total: 274
    failures: 0
    exit_code: 0
    new_this_story: 31
  files_reviewed:
    - frontend/src/app/core/models/study-session.model.ts
    - frontend/src/app/core/services/study-session.service.ts
    - frontend/src/app/core/services/study-session.service.spec.ts
    - frontend/src/app/features/agenda/agenda/agenda.ts
