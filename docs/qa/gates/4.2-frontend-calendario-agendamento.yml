top_issues:
  - id: C1
    severity: medium
    description: >
      openSessionDetail (agenda.ts:156-166) itera sobre todos os subjects e dispara
      topicService.getAll(subj.id) para cada um sem unsubscribe — N requests por clique,
      risco de memory leak e race condition.
    ac_ref: AC8
    suggested_owner: dev
    suggested_fix: >
      Usar forkJoin para paralelizar com cleanup, ou implementar early-exit com takeUntil(destroy$).
      Alternativa: incluir topic_name no payload da sessão via backend.

  - id: C2
    severity: high
    description: >
      Botão "Registrar resultado" ausente do dialog de detalhe — AC8 e Task 4 exigem botão
      que navega para o fluxo de conclusão (Story 4.3). Template tem apenas "Excluir" e "Fechar".
    ac_ref: AC8
    suggested_owner: dev
    suggested_fix: >
      Adicionar p-button "Registrar Resultado" no footer do detail dialog.
      Condicionar a selectedSession.status !== 'completed'.
      Navegar via routerLink ou router.navigate() para rota de conclusão de 4.3.

informational:
  - id: N1
    description: >
      Título do evento no calendário é 'Sessão #${id}' — Dev Notes especificam 'title: topicName'.
      Limitação do payload (sem topic_name); funcionalmente aceitável mas diverge da especificação.

required_actions:
  - owner: dev
    issue: C2
    priority: high
    action: Adicionar botão "Registrar resultado" no detail dialog com navegação para rota 4.3.
  - owner: dev
    issue: C1
    priority: medium
    action: Refatorar openSessionDetail para evitar N requests sem cleanup.

approval_for_merge: false
notes: >
  C2 é a correção prioritária — é um AC explícito desta story que ficou incompleto.
  C1 pode ser corrigido junto ou em 4.3 se a navegação for implementada lá.
