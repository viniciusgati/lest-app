top_issues:
  - id: C1
    severity: medium
    description: >
      GET /api/v1/study_sessions?status=late executa where(status: 'late') no banco;
      'late' não é um status persistido, retorna [] sem erro nem aviso.
    ac_ref: AC11
    suggested_owner: dev
    suggested_fix: >
      Ignorar status=late no filtro de banco (não aplicar where clause) e filtrar em memória,
      ou documentar explicitamente que este parâmetro não suporta o valor 'late'.

informational:
  - id: N1
    description: >
      render json: chamado dentro do bloco ActiveRecord::Base.transaction — code smell
      mas funcionalmente seguro pois render é a última instrução (todas operações DB precedem).
  - id: N2
    description: >
      Spec usa :unprocessable_entity; controller usa :unprocessable_content (Rack 3.x).
      Ambos mapeiam para HTTP 422 — cosmético.

required_actions:
  - owner: dev
    issue: C1
    priority: medium
    action: >
      Tratar caso status=late no filtro do index: ignorar a clause where ou filtrar em memória
      após query. Adicionar teste para comportamento correto de ?status=late.

