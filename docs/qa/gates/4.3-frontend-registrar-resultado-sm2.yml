top_issues:
  - id: C1
    severity: medium
    description: >
      (onHide)="reset()" no p-dialog não chama close() — reset() só limpa estado
      interno mas não emite visibleChange(false) ao pai. Se usuário fecha via X ou
      backdrop, Agenda.showCompleteDialog permanece true. Na próxima CD do Angular,
      [visible]="showCompleteDialog" re-empurra true e o dialog reabre.
    ac_ref: AC6
    suggested_owner: dev
    suggested_fix: >
      Adicionar método onDialogHide() que chama visibleChange.emit(false) antes de reset().
      Usar (onHide)="onDialogHide()" no template.

